# Parole de dezvoltare (aliniat cu .env.example). Pentru producție folosește kubectl create secret sau un manager de secrete.
apiVersion: v1
kind: Secret
metadata:
  name: simpleauth-db
  namespace: simpleauth
type: Opaque
stringData:
  POSTGRES_USER: simpleauth
  POSTGRES_PASSWORD: simpleauth_dev
  POSTGRES_DB: simpleauth
  CONNECTION_STRING: "Host=postgres;Port=5432;Database=simpleauth;Username=simpleauth;Password=simpleauth_dev"
