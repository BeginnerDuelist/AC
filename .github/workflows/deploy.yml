name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: project-6bb4f134-c5d6-455b-8bc
  REGION: europe-west1
  SERVICE_NAME: simple-auth-app
  IMAGE: europe-west1-docker.pkg.dev/project-6bb4f134-c5d6-455b-8bc/dotnet-apps/simple-auth-app

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build & Push Docker image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} .
          docker push ${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --add-cloudsql-instances=${{ env.PROJECT_ID }}:europe-west1:my-postgres \
            --set-secrets=ConnectionStrings__DefaultConnection=db-connection-string:latest \
            --memory=512Mi